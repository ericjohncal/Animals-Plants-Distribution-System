name: Extract Top Sighting, Download Image, and Commit

on:
  push:
    paths:
      - backend/data/sightings.json

permissions:
  contents: write

jobs:
  process-sighting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests
          

      - name: Extract top entry id and imageUrl
        id: extract
        run: |
          TOP_ID=$(jq -r '.[0].id' backend/data/sightings.json)
          TOP_IMAGE=$(jq -r '.[0].imageUrl' backend/data/sightings.json)

          echo "id=$TOP_ID" >> $GITHUB_OUTPUT
          echo "imageUrl=$TOP_IMAGE" >> $GITHUB_OUTPUT

      - name: Run downloader script
        run: |
          python backend/yolo/downloader.py "${{ steps.extract.outputs.imageUrl }}" backend/yolo/image.jpg

      - name: Write working ID file
        run: |
          echo "${{ steps.extract.outputs.id }}" > backend/yolo/workingid.txt
          sleep 5

      - name: Commit updated files
        run: |
          
      - name: Call Ollama
        id: call_llm
        run: |
          WORKING_ID=$(cat backend/yolo/workingid.txt)

          COMMON_NAME=$(jq -r ".[] | select(.id == $WORKING_ID) | .commonName" backend/data/sightings.json)
          CITY=$(jq -r ".[] | select(.id == $WORKING_ID) | .city" backend/data/sightings.json)
          COUNTRY=$(jq -r ".[] | select(.id == $WORKING_ID) | .country" backend/data/sightings.json)

          PROMPT="I spotted a $COMMON_NAME in $CITY in the country $COUNTRY. Does that species live there? Keep your response to just the word yes or no."

          RESPONSE=$(curl -s -X POST "http://75.111.218.179:11434/api/generate" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"mistral:7b-instruct\",
              \"prompt\": \"$PROMPT\",
              \"stream\": false
            }")

          ANSWER=$(echo "$RESPONSE" | jq -r '.response' | tr '[:upper:]' '[:lower:]')

          jq --arg id "$WORKING_ID" \
            --arg val "$ANSWER" \
            '
            (.[] | select(.id == ($id|tonumber)) | .isValid) = $val
            ' backend/data/sightings.json > tmp.json && mv tmp.json backend/data/sightings.json

      - name: Run detection
        run: |
          cd backend/yolo
          python yolo_detect.py --model=runs/detect/train/weights/best.pt --source=image.jpg

      - name: Update sightings.json status and suggestedName
        run: |
          WORKING_ID=$(cat backend/yolo/workingid.txt)
          DETECTED=$(cat backend/yolo/results.txt | xargs)

          COMMON_NAME=$(jq -r ".[] | select(.id == $WORKING_ID) | .commonName" backend/data/sightings.json)

          echo "Working ID: $WORKING_ID"
          echo "Detected: $DETECTED"
          echo "Common Name: $COMMON_NAME"

          if [ "$DETECTED" = "$COMMON_NAME" ]; then
            NEW_STATUS="Approved"
          else
            NEW_STATUS="Denied"
          fi

          jq --argjson id "$WORKING_ID" \
             --arg status "$NEW_STATUS" \
             --arg suggested "$DETECTED" '
            map(
              if .id == $id
              then .status = $status | .suggestedName = $suggested
              else .
              end
            )
          ' backend/data/sightings.json > backend/data/sightings_tmp.json

          mv backend/data/sightings_tmp.json backend/data/sightings.json

      - name: Commit results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add backend/yolo/image.jpg backend/yolo/workingid.txt
          git add backend/yolo/results.txt
          git add backend/data/sightings.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update YOLO image and working ID from latest sighting"
            git push
          fi

