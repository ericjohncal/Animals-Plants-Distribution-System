name: Run YOLO Detection
  
on:
  repository_dispatch:
    types: [yolo-update]
  workflow_dispatch:   # allows manual trigger
  push:
    paths:
      - 'backend/yolo/**'
      - 'backend/yolo/yolo_detect.py'

permissions:
  contents: write


jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run detection
        run: |
          cd backend/yolo
          python yolo_detect.py --model=runs/detect/train/weights/best.pt --source=image.jpg

      - name: Commit results back to repo
        run: |
          cd backend/yolo
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add results.txt
          git commit -m "Update results.txt" || echo "No changes"
          git push