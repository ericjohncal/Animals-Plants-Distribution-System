name: Run YOLO Detection

on:
  workflow_dispatch:   # allows manual trigger
  push:
    paths:
      - 'backend/yolo/**'
      - 'backend/yolo/yolo_detect.py'

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run detection
        run: |
          cd backend/yolo
          python yolo_detect.py --model=runs/detect/train/weights/best.pt --source=images/image.jpg

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: detection-results
          path: runs/detect/